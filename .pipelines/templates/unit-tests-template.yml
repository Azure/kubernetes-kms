parameters:
  - name: serviceConnection
    type: string

jobs:
  - job: unit_tests
    timeoutInMinutes: 10
    cancelTimeoutInMinutes: 5
    workspace:
      clean: all
    variables:
      # contains the following environment variables:
      # - AZURE_TENANT_ID
      # - KEYVAULT_NAME
      # - KEY_NAME
      # - KEY_VERSION
    - group: kubernetes-kms

    steps:
      - task: GoTool@0
        inputs:
          version: 1.26.4
      - template: prepare-deps.yaml
      - script: make lint
        displayName: Run lint
      - script: make unit-test
        displayName: Run unit tests
      - script: make build
        displayName: Build
      - script: |
          sudo ./_output/kubernetes-kms --version
        displayName: Check binary version
      - template: az-login.yaml
        parameters:
          serviceConnection: ${{ parameters.serviceConnection }}
      - script: ./scripts/mock-imds.sh up host
        displayName: Start mock IMDS (WIF)
      - script: |
          sudo mkdir /etc/kubernetes
          echo -e '{\n    "tenantId": "'$AZURE_TENANT_ID'",\n    "useManagedIdentityExtension": true\n}' | sudo tee --append /etc/kubernetes/azure.json  > /dev/null
          sudo chown root:root /etc/kubernetes/azure.json && sudo chmod 600 /etc/kubernetes/azure.json
        displayName: Setup azure.json on host
      - script: |
          sudo ./_output/kubernetes-kms --keyvault-name $KEYVAULT_NAME --key-name $KEY_NAME --key-version $KEY_VERSION --listen-addr "unix:///opt/azurekms.sock" > /dev/null &
          echo Waiting 2 seconds for the server to start
          sleep 2
          sudo env "PATH=$PATH" make integration-test
        displayName: Run integration tests
      - script: ./scripts/mock-imds.sh down
        displayName: Stop mock IMDS
        condition: always()
      - template: scan-images-template.yml
