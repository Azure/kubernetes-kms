jobs:
  - job:
    timeoutInMinutes: 15
    cancelTimeoutInMinutes: 5
    workspace:
      clean: all
    variables:
    - name: REGISTRY_NAME
      value: kind-registry
    - name: REGISTRY_PORT
      value: 5000
    - name: KUBERNETES_VERSION
      value: v1.32.3
    - name: KIND_CLUSTER_NAME
      value: kms
    - name: KIND_NETWORK
      value: kind
    # contains the following environment variables:
    # - AZURE_TENANT_ID
    # - KEYVAULT_NAME
    # - KEY_NAME
    # - KEY_VERSION
    # - USER_ASSIGNED_IDENTITY_ID
    - group: kubernetes-kms
    strategy:
      matrix:
        kmsv1_kind_v1_33_7:
          KUBERNETES_VERSION: v1.33.7
        kmsv1_kind_v1_34_3:
          KUBERNETES_VERSION: v1.34.3
        kmsv1_kind_v1_35_0:
          KUBERNETES_VERSION: v1.35.0
    steps:
      - task: GoTool@0
        inputs:
          version: 1.25.7
      - template: prepare-deps.yaml
      - script: make e2e-install-prerequisites
        displayName: "Install e2e test prerequisites"
      - script: |
          make e2e-setup-kind
        displayName: "Setup kind cluster with azure kms plugin"
        env:
          REGISTRY_NAME: $(REGISTRY_NAME)
          REGISTRY_PORT: $(REGISTRY_PORT)
          KUBERNETES_VERSION: $(KUBERNETES_VERSION)
          KIND_CLUSTER_NAME: $(KIND_CLUSTER_NAME)
          KIND_NETWORK: $(KIND_NETWORK)
      - template: cluster-health-template.yml
      - template: kind-debug-template.yml
      - script: make e2e-test
        displayName: "Run e2e tests for KMS v1"
      - template: cleanup-template.yml
  - job:
    timeoutInMinutes: 15
    cancelTimeoutInMinutes: 5
    workspace:
      clean: all
    variables:
    - name: REGISTRY_NAME
      value: kind-registry
    - name: REGISTRY_PORT
      value: 5000
    - name: KUBERNETES_VERSION
      value: v1.32.3
    - name: KIND_CLUSTER_NAME
      value: kms
    - name: KIND_NETWORK
      value: kind
    # contains the following environment variables:
    # - AZURE_TENANT_ID
    # - KEYVAULT_NAME
    # - KEY_NAME
    # - KEY_VERSION
    # - USER_ASSIGNED_IDENTITY_ID
    - group: kubernetes-kms
    strategy:
      matrix:
        kmsv2_kind_v1_33_7:
          KUBERNETES_VERSION: v1.33.7
        kmsv2_kind_v1_34_3:
          KUBERNETES_VERSION: v1.34.3
        kmsv2_kind_v1_35_0:
          KUBERNETES_VERSION: v1.35.0
    steps:
      - task: GoTool@0
        inputs:
          version: 1.25.7
      - template: prepare-deps.yaml
      - script: make e2e-install-prerequisites
        displayName: "Install e2e test prerequisites"
      - script: |
          make e2e-kmsv2-setup-kind
        displayName: "Setup kind cluster with azure kms plugin"
        env:
          REGISTRY_NAME: $(REGISTRY_NAME)
          REGISTRY_PORT: $(REGISTRY_PORT)
          KUBERNETES_VERSION: $(KUBERNETES_VERSION)
          KIND_CLUSTER_NAME: $(KIND_CLUSTER_NAME)
          KIND_NETWORK: $(KIND_NETWORK)
      - template: cluster-health-template.yml
      - template: kind-debug-template.yml
      - script: make e2e-kmsv2-test
        displayName: "Run e2e tests for KMS v2"
      - template: cleanup-template.yml
